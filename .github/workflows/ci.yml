name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Validate backend imports
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/moviematch
          TELEGRAM_BOT_USERNAME: ci_bot
          TELEGRAM_BOT_TOKEN: ci_token
          GEMINI_API_KEY: ci_key
          TMDB_API_KEY: ci_key
        run: python -m compileall app && python -c "from app.main import app; print(app.title)"

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: /api
        run: npm run build

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.prod.yml config
